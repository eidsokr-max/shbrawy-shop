<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>شبراوي جروب | متجر الموبايلات</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header>

    <div class="logo">

        <i class="fa-solid fa-mobile-screen-button"></i>

        <h1>شبراوي جروب</h1>

    </div>

    <div class="header-text">

        <h2>عالم الموبايلات والإكسسوارات</h2>

        <p>أفضل الأسعار وأحدث الهواتف</p>

    </div>

</header>

<section class="top-search">

    <input
        type="text"
        id="searchInput"
        placeholder="🔍 ابحث عن هاتف...">

    <select id="brandFilter">

        <option value="الكل">كل الماركات</option>

        <option value="سامسونج">سامسونج</option>

        <option value="آيفون">آيفون</option>

        <option value="أوبو">أوبو</option>

        <option value="ريلمي">ريلمي</option>

        <option value="ريدمي">ريدمي</option>

        <option value="فيفو">فيفو</option>

    </select>

</section><section class="toolbar">

    <button id="sortLow">
        <i class="fa-solid fa-arrow-down-1-9"></i>
        السعر من الأقل
    </button>

    <button id="sortHigh">
        <i class="fa-solid fa-arrow-down-9-1"></i>
        السعر من الأعلى
    </button>

    <button id="refreshProducts">
        <i class="fa-solid fa-rotate"></i>
        تحديث
    </button>

    <button id="loginBtn" class="admin-btn">
        <i class="fa-solid fa-user-shield"></i>
        دخول المدير
    </button>

</section>

<main>

    <div id="product-list" class="product-grid">

        <div class="loading">

            <i class="fa-solid fa-spinner fa-spin"></i>

            <p>جاري تحميل المنتجات...</p>

        </div>

    </div>

</main>

<section id="adminPanel" class="admin-panel hidden">

    <h2 id="formTitle">

        إضافة منتج جديد

    </h2>

    <input
        type="hidden"
        id="editId">

    <div class="form-group">

        <label>الماركة</label>

        <input
            type="text"
            id="brand"
            placeholder="Samsung">

    </div>

    <div class="form-group">

        <label>الموديل</label>

        <input
            type="text"
            id="model"
            placeholder="Galaxy S25 Ultra">

    </div>    <div class="form-group">

        <label>الوصف</label>

        <textarea
            id="desc"
            rows="5"
            placeholder="اكتب مواصفات الهاتف..."></textarea>

    </div>

    <div class="form-group">

        <label>السعر</label>

        <input
            type="number"
            id="price"
            placeholder="25000">

    </div>

    <div class="form-group">

        <label>رابط الصورة</label>

        <input
            type="text"
            id="imgUrl"
            placeholder="https://">

    </div>

    <div class="preview">

        <img
            id="previewImage"
            src="https://via.placeholder.com/250x250?text=Preview"
            alt="Preview">

    </div>

    <div class="buttons">

        <button id="saveBtn" class="save-btn">

            <i class="fa-solid fa-floppy-disk"></i>

            حفظ المنتج

        </button>

        <button id="cancelBtn" class="cancel-btn">

            <i class="fa-solid fa-xmark"></i>

            إلغاء

        </button>

    </div>

</section>

<footer>

    <p>

        © 2026 Shbrawy Group

    </p>

</footer>

<div id="toast"></div><script type="module" src="firebase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
