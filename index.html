<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبراوي جروب - متجر متكامل</title>
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        header { text-align: center; padding: 20px; }
        .filter-nav { text-align: center; margin-bottom: 20px; }
        .filter-nav button { margin: 5px; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; background: #ddd; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .admin-section { background: white; padding: 30px; border-radius: 15px; margin-top: 50px; border: 2px dashed #007bff; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>

<header>
    <h1>شبراوي جروب - عالم الموبايلات</h1>
</header>

<nav class="filter-nav">
    <button onclick="renderProducts('الكل')">الكل</button>
    <button onclick="renderProducts('سامسونج')">سامسونج</button>
    <button onclick="renderProducts('آيفون')">آيفون</button>
</nav>

<div id="product-list" class="product-grid">جاري تحميل المنتجات...</div>

<div class="admin-section" id="admin-panel" style="display:none;">
    <h3>لوحة التحكم الاحترافية</h3>
    <input type="text" id="brand" placeholder="الماركة">
    <input type="text" id="model" placeholder="الموديل">
    <textarea id="desc" placeholder="المواصفات"></textarea>
    <input type="number" id="price" placeholder="السعر">
    <input type="text" id="imgUrl" placeholder="رابط الصورة">
    <button class="btn-action" onclick="addProduct()">نشر المنتج</button>
</div>

<div style="text-align: center; margin-top: 20px;">
    <button onclick="checkAdmin()">دخول المدير</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyCGJQVtLATT1yFdkR58JyTxJ0kbQhnLVRg",
        projectId: "shbrawy-shop"
    }));

    let allProducts = [];

    async function fetchProducts() {
        const snapshot = await getDocs(collection(db, "products"));
        allProducts = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
        renderProducts('الكل');
    }

    window.renderProducts = (cat) => {
        const list = document.getElementById("product-list");
        const filtered = cat === 'الكل' ? allProducts : allProducts.filter(p => p.brand === cat);
        list.innerHTML = filtered.map(p => `
            <div class="card">
                <img src="${p.imgUrl || 'https://via.placeholder.com/200'}" alt="صورة">
                <h3>${p.brand} - ${p.model}</h3>
                <p>${p.desc}</p>
                <div class="price">${p.price} جنيه</div>
                <button onclick="deleteProduct('${p.id}')" style="background:var(--danger); color:white; border:none; padding:5px 10px;">حذف</button>
            </div>
        `).join('');
    }

    window.addProduct = async () => {
        await addDoc(collection(db, "products"), {
            brand: document.getElementById('brand').value,
            model: document.getElementById('model').value,
            desc: document.getElementById('desc').value,
            price: document.getElementById('price').value,
            imgUrl: document.getElementById('imgUrl').value
        });
        alert("تم الإضافة!");
        fetchProducts();
    }

    window.deleteProduct = async (id) => {
        if(confirm("حذف المنتج؟")) {
            await deleteDoc(doc(db, "products", id));
            fetchProducts();
        }
    }

    window.checkAdmin = () => {
        if(prompt("كلمة المرور:") === "1234") document.getElementById('admin-panel').style.display = 'block';
    }

    fetchProducts();
</script>

</body>
</html>
