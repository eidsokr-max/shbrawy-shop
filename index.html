<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبراوي جروب | عالم الموبايلات</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->

    <header class="header">

        <h1>📱 شبراوي جروب</h1>

        <p>أفضل أسعار الموبايلات والإكسسوارات</p>

    </header>


    <!-- Search -->

    <section class="top-bar">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 ابحث عن أي موبايل..."
        >

    </section>


    <!-- Categories -->

    <nav class="filter-nav">

        <button class="active" data-brand="الكل">
            الكل
        </button>

        <button data-brand="سامسونج">
            سامسونج
        </button>

        <button data-brand="آيفون">
            آيفون
        </button>

        <button data-brand="شاومي">
            شاومي
        </button>

        <button data-brand="أوبو">
            أوبو
        </button>

        <button data-brand="ريلمي">
            ريلمي
        </button>

        <button data-brand="فيفو">
            فيفو
        </button>

    </nav>


    <!-- Products -->

    <main>

        <div id="product-list" class="product-grid">

            جاري تحميل المنتجات...

        </div>

    </main>



    <!-- Floating Admin Button -->

    <button id="adminBtn" class="floating-btn">

        ⚙️

    </button>



    <!-- Admin Panel -->

    <div id="adminModal" class="modal">

        <div class="modal-content">

            <span class="close">&times;</span>

            <h2 id="form-title">

                إضافة منتج جديد

            </h2>

            <input
                type="hidden"
                id="edit-id"
            >

            <input
                type="text"
                id="brand"
                placeholder="الماركة"
            >

            <input
                type="text"
                id="model"
                placeholder="الموديل"
            >

            <textarea
                id="desc"
                placeholder="الوصف"
            ></textarea>

            <input
                type="number"
                id="price"
                placeholder="السعر"
            >

            <input
                type="text"
                id="imgUrl"
                placeholder="رابط الصورة"
            >

            <button id="saveBtn">

                💾 حفظ المنتج

            </button>

        </div>

    </div>



    <!-- Toast -->

    <div id="toast"></div>


    <!-- Firebase -->

    <script type="module" src="script.js"></script>

</body>

</html>
