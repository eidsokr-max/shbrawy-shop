<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبراوي جروب - متجر الأجهزة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
        .card h3 { margin: 10px 0; color: #333; }
        .price { color: #28a745; font-weight: bold; font-size: 1.2rem; }
        .admin-btn { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        #admin-panel { display: none; background: #fff3cd; padding: 20px; border-radius: 10px; margin-top: 20px; border: 1px solid #ffeeba; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">شبراوي جروب - أحدث العروض</h1>
    
    <div id="product-list" class="product-grid">جاري تحميل المنتجات...</div>
    
    <div style="text-align: center;">
        <button class="admin-btn" onclick="openAdmin()">إدارة المتجر</button>
    </div>

    <div id="admin-panel">
        <h3>لوحة تحكم المدير</h3>
        <input type="text" id="brand" placeholder="الماركة (مثال: Samsung)">
        <input type="text" id="model" placeholder="الموديل (مثال: A34)">
        <input type="number" id="price" placeholder="السعر (مثال: 5500)">
        <input type="text" id="imgUrl" placeholder="رابط صورة المنتج">
        <br><br>
        <button onclick="addProduct()">إضافة المنتج للموقع</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGJQVtLATT1yFdkR58JyTxJ0kbQhnLVRg",
            authDomain: "shbrawy-shop.firebaseapp.com",
            projectId: "shbrawy-shop",
            storageBucket: "shbrawy-shop.firebasestorage.app",
            messagingSenderId: "619982205483",
            appId: "1:619982205483:web:cab9426ce2888220ef306e"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        window.openAdmin = () => {
            const pass = prompt("كلمة المرور:");
            if(pass === "1234") document.getElementById('admin-panel').style.display = 'block';
            else alert("كلمة المرور غير صحيحة!");
        }

        async function loadProducts() {
            const list = document.getElementById("product-list");
            const snapshot = await getDocs(collection(db, "products"));
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                list.innerHTML += `
                    <div class="card">
                        <img src="${p.imgUrl || 'https://via.placeholder.com/200'}" alt="صورة">
                        <h3>${p.brand} - ${p.model}</h3>
                        <p class="price">${p.price} جنيه</p>
                        <button style="background:#dc3545;" onclick="deleteProduct('${doc.id}')">حذف</button>
                    </div>`;
            });
        }

        window.addProduct = async () => {
            await addDoc(collection(db, "products"), {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                price: document.getElementById('price').value,
                imgUrl: document.getElementById('imgUrl').value
            });
            alert("تمت الإضافة!");
            loadProducts();
        }

        window.deleteProduct = async (id) => {
            if(confirm("حذف المنتج؟")) {
                await deleteDoc(doc(db, "products", id));
                loadProducts();
            }
        }
        loadProducts();
    </script>
</body>
</html>
